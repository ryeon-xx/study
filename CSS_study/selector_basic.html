<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* CSS 블록 */
        /* color : 글자 색, background, background-color : 배경 색, width : 너비 */
        /* h1 : 태그 선택자 */
        h1 {
            color: white;
            background-color: skyblue;
        }
    </style>
</head>
<body>
    <h1>CSS3 선택자 기본</h1>
</body>
</html>
