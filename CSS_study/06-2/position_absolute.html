<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* position 속성 : absolute */
        /* box 3개가 위에서 밑으로 연달아 있다가 마지막 거 하나로 겹쳐짐 */
        .box {
            width: 100px;
            height: 100px;
            position: absolute;
        }
        .box:nth-child(1) {
            background-color: pink;
        }
        .box:nth-child(2) {
            background-color: lightgreen;
        }
        .box:nth-child(3) {
            background-color: lightblue;
        }
    </style>
</head>
<body>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
</body>
</html>
