<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width: 100px;
            height: 100px;
            background-color: skyblue;
            margin: 10px;
            padding: 10px;

            /* float 속성 */
            /* left : 태그를 왼쪽에 붙임 */
            /* right : 태그를 오른쪽에 붙임 */
            float: left;
            /* float: right; */
        }

        /* 그림자 속성 */
        /* text-shadow 속성 : 글자에 그림자를 부여 */
        /* box-shadow 속성 : 박스에 그림자를 부여 */

        /* 그래디언트 생성기 사용하기
           https://www.colorzilla.com/gradient-editor/ */
    </style>
</head>
<body>
    <div class="box">1</div>
    <div class="box">2</div>
</body>
</html>
