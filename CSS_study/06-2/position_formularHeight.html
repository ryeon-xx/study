<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* absolute 속성값이 배정된 요소가 자식 클래스인 경우 */
        /* 부모 요소에 height 속성 지정 */
        .box {
            width: 100px;
            height: 100px;
            position: absolute;
        }
        .box:nth-child(1) {
            background-color: lightcoral;
            left: 10px;
            top: 10px;
            z-index: 100;
        }
        .box:nth-child(2) {
            background-color: lightsalmon;
            left: 50px;
            top: 50px;
            z-index: 10;
        }
        .box:nth-child(3) {
            background-color: lightcyan;
            left: 90px;
            top: 90px;
            z-index: 1;
        }
        
        body > div {
            width: 400px;
            height: 100px;
            border: 3px solid black;
            /* 자손의 position 속성에 absolute 키워드를 적용하려면
               부모의 position 속성에 relative 키워드를 적용 */
            position: relative;

            /* 영역을 벗어나는 부분 감춤 */
            overflow: hidden;
            
            /* 영역을 벗어나는 부분을 스크롤로 만듦 */
            /* overflow: scroll */

            
            /* overflow-x, overflow-y
               - x, y 각각의 축 방향으로 스크롤 여부 지정 가능 */
            /* scroll : 영역을 벗어나는 부분을 스크롤로 만듦. */
        }
    </style>
</head>
<body>
    <h1>Lorem ipsum dolor amet</h1>
    <div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
    <h1>Lorem ipsum dolor amet</h1>
</body>
</html>
