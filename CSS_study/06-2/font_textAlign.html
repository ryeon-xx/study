<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .font_big {
            font-size: 2em;
        }
        .font_italic {
            font-style: italic;
        }
        .font_bold {
            font-weight: bold;
        }

        /* 글자 정렬 */
        /* span 태그는 중앙이라는 개념이 없으므로 text-align 속성을 적용할 수 없음. */
        /* text-align 속성은 글자 정렬을 지정 */
        .font_center {
            text-align: center;
        }
        .font_right {
            text-align: right;
        }
    </style>
</head>
<body>
    <p class="font_big font_italic font_bold font_center">Lorem ipsum dolor amet</p>
    <p class="font_bold font_right">2026.03.21</p>
    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit...</p>
</body>
</html>
