<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 글꼴 스타일 지정하기 */

        /* font-size : 글자 크기 */
        .font_big {
            font-size: 2em;
        }

        /* font-style : 글자 스타일 */
        .font_italic {
            font-style: italic;
        }

        /* font-weight : 글자 굵기 */
        .font_bold {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <p class="font_big font_italic font_bold">Lorem ipsum dolor amet</p>
</body>
</html>
