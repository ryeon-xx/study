<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 구조 선택자 */

        ul {
            overflow: hidden;
        }
        li {
            list-style: none;
            float: left;
            padding: 15px;
        }

        /* :first-child : 형제 관계에서 첫 번째로 등장하는 태그 선택 */
        li:first-child {
            border-radius: 10px 0 0 10px;
        }

        /* :nth-child(수열) : 형제 관계에서 앞에서 수열 번째로 등장하는 태그 선택 */
        li:nth-child(2n) {
            background-color: pink;
        }
        li:nth-child(2n-1) {
            background-color: skyblue;
        }

        /* :last-child : 형제 관계에서 마지막으로 등장하는 태그 선택 */
        li:last-child {
            border-radius: 0 10px 10px 0;
        }

        /* :nth-last-child : 형제 관계에서 뒤에서 수열 번째로 등장하는 태그 선택 */
        
    </style>
</head>
<body>
    <ul>
        <li>첫 번째</li>
        <li>두 번째</li>
        <li>세 번째</li>
        <li>네 번째</li>
        <li>다섯 번째</li>
        <li>여섯 번째</li>
        <li>일곱 번째</li>
    </ul>
</body>
</html>
