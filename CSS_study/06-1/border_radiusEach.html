<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 모서리 마다 둥글기 다르게 적용하기 */
        .box {
            border-width: thick;
            border-color: black;
            border-style: dashed;
            /* border-radius : "왼쪽 위", "오른쪽 위", "오른쪽 아래", "왼쪽 아래" */
            border-radius: 50px 40px 30px 10px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Lorem ipsum dolor amet</h1>
    </div>
</body>
</html>
