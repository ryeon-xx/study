<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 기본 테두리 만들기 */
        .box {
            /* border-width : 테두리 굵기 */
            border-width: thick;
            /* border-style : 테두리 형태 */
            border-style: dashed;
            /* border-color : 테두리 색상 */
            border-color: pink;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Lorem ipsum dolor amet</h1>
    </div>
</body>
</html>
