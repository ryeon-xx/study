<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 초기화 */
        * { margin: 0; padding: 0; }

        /* 주제 */
        body {
            margin: 0 auto;
            width: 960px;
        }

        /* 수평 정렬 레이아웃 */
        /* clear 속성 - float 속성 적용 제거 (left, right, both) */
        div.clear {
            clear: both;
        }
    </style>
</head>
<body>
    <h1>Lorem ipsum</h1>
    <h2>Neque porro quisquam est qui..</h2>
    <p>Lorem ipsum dolor sit amet, ...</p>
    <p>Proin ut quam feugiat, tincidunt dolo nec, ...</p>
</body>
</html>
