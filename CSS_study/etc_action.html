<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 반응 선택자 */
        /* hover : 사용자가 특정 태그 위에 마우스 커서를 올린 상태 */
        /* active : 특정 태그를 마우스로 클릭한 상태 */
        h1:hover {
            color: rgb(255, 195, 84);
        }
        h1:active {
            color: rgba(75, 255, 75, 0.804);
        }
    </style>
</head>
<body>
    <h1>반응 선택자</h1>
</body>
</html>
