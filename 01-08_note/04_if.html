<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>if문 실습</title>
</head>
<body>
    <h1>if문 실습</h1>
    <p>F12 -> Console에서 결과를 확인하세요.</p>

    <script>
        /*
            =========================================
            조건문 (Conditional Statement)
            =========================================
        
            조건문은
            "조건이 참인지 거짓인지"에 따라
            다른 코드를 실행하는 문장이다.

            JavaScript에서 대표적인 조건문
            1. if
            2. if ~ else
            3. else if
            4. switch


            ==========================================
            1. if 문
            ==========================================

            조건이 참(true)이면
            중괄호 안의 코드를 실행한다.
            거짓(false)이면 실행하지 않는다.

            기본 문법

            if(조건식) {
                실행문;
            }
        
        */

        // 문제 1. 나이가 18 이상이면 "성인입니다." 를 출력하세요.

        let age = 20;

        if (age >= 18) {
            console.log("성인입니다.");
        }


        /* 
            ==========================================
            2. if ~ else 문
            ==========================================

            조건이 참이면 if 블록 실행
            조건이 거짓이면 else 블록 실행

            기본 문법

            if (조건식) {
                실행문1;
            } else {
                실행문2; 
            }
        
        */


        // 문제2. 점수가 70점 이상이면 "합격입니다."
        // 70점 미만이면 "불합격입니다." 를 출력하세요.


        let score = 75;

        if (score >= 70) {
            console.log("합격입니다.");
        } else {
            console.log("불합격입니다.");
        }



        /* 
            ==========================================
            3. else if 문
            ==========================================

            조건이 여러 개일 때 사용한다.
            
            위에서부터 순서대로 검사하고
            처음 참이 되는 블록만 실행한다.

            기본 문법

            if (조건식1) {
                실행문1;
            } else if (조건식2) {
                실행문2; 
            } else {
                실행문3; 
            }
        
        */


        // 문제3. 점수에 따라 등급을 출력하세요.
        // 90점 이상 -> A등급
        // 80점 이상 -> B등급
        // 70점 이상 -> C등급
        // 그 미만 -> 재시험


        let score2 = 62;

        if (score2 >= 90) {
            console.log("A등급");
        } else if (score2 >= 80) {
            console.log("B등급");
        } else if (score2 >= 70) {
            console.log("C등급");
        } else {
            console.log("재시험");
        }


        /* 
            ==========================================
            4. 중첩 if 문 (nested if)
            ==========================================

            if문 안에 또 다른 if문을 넣는 방식

            조건을 단계적으로 검사할 때 사용
            너무 많이 중첩하면 코드가 복잡해질 수 있다.
        
        */


        /* 
            문제4. 로그인 프로그램을 만드세요.

            아이디가 "admin"이고
            비밀번호가 "1234" 이면 "로그인 성공" 출력

            아이디가 맞고 비밀번호가 틀리면
            "비밀번호가 틀렸습니다." 출력

            아이디가 틀리면
            "아이디가 없습니다." 출력
        
        */

        let id = "admin";
        let pw = "1234";

        if (id === "admin") {
            if (pw === "1234") {
                console.log("로그인 성공");
            } else {
                console.log("비밀번호가 틀렸습니다.");
            }
        } else {
            console.log("아이디가 없습니다.");
        }


        /* 
            ==========================================
            5. 비교 연산자
            ==========================================

            if문의 조건식에는 보통 비교 연산자가 들어간다.

            > 크다
            < 작다
            >= 크거나 같다
            <= 작거나 같다
            == 값만 비교
            === 값과 자료형까지 비교
            != 값이 다름
            !== 값 또는 자료형이 다름

            실무에서는
            == 보다 === 사용을 권장
        
        */


        let x = 100;
        let y = "100";

        if (x === y) {
            console.log("x == y : 값만 비교하면 같다.");
        }

        if (x === y) {
            console.log("x === y : 값과 자료형까지 같다.");
        } else {
            console.log("x === y : 값은 같으나 자료형이 달라서 false");
            
        }


        /* 
            ==========================================
            6. 논리 연산자와 함께 사용
            ==========================================

            && 그리고(AND)
            || 또는(OR)
            ! 부정(NOT)

            조건을 여러 개 조합할 때 사용
        
        */

        /* 
            문제6. 키가 170이상이고 몸무게가 65 이상이면
                   "조건을 모두 만족합니다." 를 출력하세요.
        
        */

        let height = 170;
        let weight = 65;

        if (height >= 170 && weight >= 65) {
            console.log("조건을 모두 만족합니다.");
        }


        /*
            문제7. 지역이 "서울" 또는 "경기" 이면
            "수도권입니다."를 출력하세요.
        */

        let area = "경기";

        if (area === "서울" || area === "경기") {
            console.log("수도권입니다.");
        }


        /*
            문제8. 회원이 아니라면 "회원이 아닙니다."를 출력하세요.
        */

        let isMember = false;

        if (!isMember) {
            console.log("회원이 아닙니다.");
        }

        // if(!isMember) console.log("회원이 아닙니다.");
        // 짧으면 한 줄로 표현 가능
        // 웬만하면 블록 지정 {}을 해서 나타내자.


        /* 
            ==========================================
            6-1. 논리 연산자 우선순위
            ==========================================

            논리 연산자의 우선순위

            1순위 : ! (NOT)
            2순위 : && (AND)
            3순위 : || (OR)
            
            즉 실행 순서

            ! -> && -> ||

            괄호 ()를 사용하면 
            실행 순서를 명확하게 지정할 수 있다.
        
        */

        let result1 = !true || false && true;

        console.log(result1);
        // 1. !true -> false
        // 2. false && true -> false
        // 3. false || false -> false


        // 괄호를 사용하면 실행 순서가 달라진다.

        let result2 = (!true || false) && true;

        console.log(result2);
        // 1. !true -> false
        // 2. !true || false -> false
        // 3. false && false -> false
        

        /* 
            ==========================================
            7. truthy / falsy
            ==========================================

            https://developer.mozilla.org/en-US/docs/Glossary/Truthy
            https://developer.mozilla.org/en-US/docs/Glossary/Falsy

            JavaScript의 if문은
            true / false 만 검사하는 것이 아니라
            truthy / falsy 값도 판단한다.

            falsy로 취급되는 대표 값(false처럼 동작하는 것)
            false
            0
            ""
            null
            undefined
            NaN

            이 외의 많은 값은 truthy
        */

        let message = ""; // "" : falsy

        if (message) {
            console.log("메시지가 있습니다.");
        } else {
            console.log("메시지가 비어 있습니다.");
        }

        let userName = "홍길동";

        if (userName) {
            console.log("이름이 존재합니다.");
        }


        
        /* 
            ==========================================
            8. 블록문 { }
            ==========================================

            if문에서 실행할 코드가 여러 줄이면
            반드시 중괄호를 사용하는 것이 좋다.

            한 줄이어도 중괄호 사용을 권장
            -> 가독성, 유지보수성 향상
        */

        let num = 10;

        if(num > 0) {
            console.log("양수입니다.");
            console.log("0보다 큽니다.");
        } else {
            console.log("양수가 아닙니다.");
        }



        /* 
            ==========================================
            9. 조건 순서가 중요함
            ==========================================

            else if 는 위에서부터 검사하므로
            넓은 조건을 먼저 쓰면
            아래 조건이 실행되지 않을 수 있다.
        
        */

        let grade = 95;

        if (grade >= 60) {
            console.log("합격");
        } else if(grade >= 90) {
            console.log("우수");
        }

        /*
            위 코드는 95여도 첫 번째 조건 grade >= 60이 먼저 참이므로
            "합격"만 출력된다.

            따라서 범위가 큰 조건을 먼저 써야 한다.
        */

        if (grade >= 90) {
            console.log("우수");
        } else if (grade >= 60) {
            console.log("합격");
        }



        /* 
            ==========================================
            10. 삼항 연산자
            ==========================================

            조건에 따라 두 표현식 중 하나를 선택하는 연산자

            문법
            조건식 ? 참일 때 값 : 거짓일 때 값 -> // 삼항 연산자

            ex) 2 + 1 의 경우 1, 2 : 피연산자, + : 연산자

            삼항 연산자는 3개의 피연산자를 받는 유일한 JavaScript 연산자이다.
            if ~ else를 짧게 쓸 때 자주 사용한다.
        
        */

        // 문제 10. 나이가 18 이상이면 "성인" 아니면 "미성년자"를 출력하세요.

        let age2 = 17;
        let result = age2 >= 18 ? "성인" : "미성년자";

        console.log(result);
        


        /* 
            ==========================================
            11. if 문과 switch 차이
            ==========================================

            if문
            -> 범위 비교, 여러 조건식에 적합

            switch문
            -> 특정 값이 정확히 일치하는 경우에 적합

            https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Statements/switch

            switch는 표현식을 평가하고,
            case 값과 일치하는 절부터 break를 만날 때까지 실행한다.


            switch (표현식) {
            case 값1 :
                실행코드
                break;

            case 값2 :
                실행코드
                break;

            default:
                기본 실행코드
            }
        
        */


        let menu = "drink";    // switch(표현식) === case 값 -> 값비교

        switch(menu) {
            case "coffee":
                console.log("커피 선택");
                break;
            case "tea":
                console.log("차 선택");
                break;
            default:
                console.log("기타 메뉴");
        }



        /*
            문제 : 숫자가 짝수인지 홀수인지 판별하세요.

            숫자가 2로 나누어 떨어지면 "짝수" number % 2 ===0
            아니면 "홀수"를 출력하세요.
        */

        let isNumber = 7;

        if (isNumber % 2 === 0) {
            console.log("짝수");
        } else {
            console.log("홀수");
        }



        /*
            문제 : 로그인 상태를 확인하세요.

            login 값이 true 이면
            "로그인 상태입니다." 출력
            
            false이면
            "로그인이 필요합니다." 출력
        */

        let login = true;

        if (login === true) {
            console.log("로그인 상태입니다.");
        } else {
            console.log("로그인이 필요합니다.");
        }




        /*
            문제 : 상품 가격이 12000원입니다.

            VIP 회원이면 가격의 10%를 할인하여
            "할인 가격 : "을 출력하세요.

            VIP 회원이 아니리면
            "일반 가격 : "과 원래 가격을 출력하세요.
        */

        let price = 1200;
        let vipmem = false;

        if (vipmem === true) {
            console.log("할인 가격 : ", (price * 0.9));
        } else {
            console.log("일반 가격 : ", price);
        }



        /*
            ==============================
            자주 하는 실수
            ==============================

            1. = 와 == 를 혼동
                = : 대입
                == : 비교

            2. 조건 순서를 잘못 작성
            3. 중괄호 생략으로 가독성 저하
            4. == 대신 === 를 쓰지 않아 타입 문제 발생
        
        */


        /*
            ======================================
            정리
            ======================================

            if
            → 조건이 참일 때만 실행

            if ~ else
            → 참 / 거짓 두 경우 분기

            else if
            → 여러 조건 분기

            중첩 if
            → 조건 안에 또 조건

            삼항 연산자
            → 짧은 조건 표현

            switch
            → 값이 정확히 일치하는 경우 분기
        */
    </script>
</body>
</html>
