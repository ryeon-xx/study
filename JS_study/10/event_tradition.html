<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // 고전 이벤트 모델

        // 이벤트 연결
        window.onload = function() {
            // 문서 객체 선택
            let button = document.getElementById('button');

            // 이벤트를 연결합니다.
            button.onclick = function() {
                alert('click');
            };
        };
    </script>
</head>
<body>
    <button id="button">버튼</button>
</body>
</html>
