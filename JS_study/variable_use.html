<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // 프로그래밍 학습 순서

        //   - 변수(ram에 데이터들 공간) --> CPU가 가져다가 연산을 함.
        //      1) 정수, 실수 : 숫자만
        //      2) 문자, 문자열 : '문자'
        //      3) 논리 데이터(bool) : true/false
           
        //   - 연산자 (CPU가 처리하게 하는 코드상의 기호)
        //      1) 산술(사칙연산) : +, -, *, /(몫), %(나머지)
        //      2) 비교 : == (동일한지), ! (동일하지 않은지) , > , >=, < , <=
        //      3) 결합 : 문자들 사이에서 쓰임, +
        //      4) 대입 : =
        //      5) 논리 : &&(and, 모든 조건 다 맞아야 할 때), || (or, 조건 하나만 맞아도 될때), !(not)
             
        //   - 전체 코드 제어문 : 순서문, 조건문, 반복문
        
        
        // 변수를 선언 및 초기화합니다.
        // let pi : 변수 선언
        // pi = 3.14159265 : 값 할당
        let radius = 10;
        let pi = 3.14159265;

        // 출력합니다.
        alert(2 * radius * pi);

        // let을 붙인 식별자는 변수, const를 붙인 식별자는 상수.
        // const radius = 10;
        // const pi = 3.14159265;
    </script>
</head>
<body>
    
</body>
</html>
