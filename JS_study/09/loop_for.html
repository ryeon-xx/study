<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // for 반복문 : 원하는 횟수만큼 반복하고 싶을 때 사용

        // 변수를 선언합니다.
        let array = ['가', '나', '다'];

        // 반복을 수행합니다.
        // for ( 초기식; 조건식; 종결식 ) { 문장 }
        for (let i = 0; i < 3; i++) {
            // 출력합니다.
            alert(i + '번째 출력 : ' + array[i]);
        }
    </script>
</head>
<body>
    
</body>
</html>
