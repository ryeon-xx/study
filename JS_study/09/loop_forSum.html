<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // for 반복문을 사용한 0부터 100까지 합 계산
        // 변수를 선언합니다.
        let output = 0;

        // 반복을 수행합니다.
        for (let i = 0; i <= 100; i++) {
            output += i;
        }
        alert(output);
    </script>
</head>
<body>
    
</body>
</html>
