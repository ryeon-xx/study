<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // 매개변수와 반환 값이 있는 함수
        // 매개변수 : 함수의 괄호 안에 집어넣어 함수 쪽에 추가적인 정보를 전달.
        // 리턴 값 : 함수를 실행한 결과

        // 함수를 선언합니다.
        // f(x) 안에 x가 매개변수
        function f(x) {
            return x * x;    // return 반환 값;
        };
        
        // 함수를 호출합니다.
        alert(f(6));
    </script>
</head>
<body>
    
</body>
</html>
