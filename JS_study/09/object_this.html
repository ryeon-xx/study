<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // 속성과 메서드
        // 요소 : 배열에 있는 값 하나하나
        // 속성 : 객체에 있는 값 하나하나
        
        // 메서드 : 객체 속성 중 자료형이 함수인 속성

        // 객체를 선언합니다.
        let person = {
            name : '윤인성',
            eat : function(food) {
                // 객체에 있는 속성을 메서드에서 사용하고 싶을 때는 자신(this)이
                // 가진 속성임을 분명하게 표시해야 함.
                alert(this.name + '이 ' + food + '을/를 먹습니다.');
            }
        };

        // 메서드를 호출합니다.
        person.eat('밥');
    </script>
</head>
<body>
    
</body>
</html>
