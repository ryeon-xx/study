<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- HTML5 문서 구조화 -->
    <!-- 시맨틱 태그(semantic tag) -->
    <!-- 시맨틱(semantic) 웹 : 컴퓨터 프로그램이 코드를 읽고 의미를 인식할 수 있는 지능형 웹 -->
    <!-- 시맨틱 태그 : 웹 페이지의 태그에 의미를 부여하는 태그 -->
    <!-- 1. <header> : 머리말(페이지 제목, 페이지 소개) -->
    <!-- 2. <nav> : 하이퍼링크들을 모아 둔 내비게이션 -->
    <!-- 3. <aside> : 본문 흐름에 벗어나는 노트나 팁 -->
    <!-- 4. <section> : 문서의 장이나 절에 해당하는 내용 -->
    <!-- 5. <article> : 본문과 독립적인 콘텐츠 영역 -->
    <!-- 6. <footer> : 꼬리말(저자나 저작권 정보) -->
    <header>
      <h1>HTML5 기본</h1>
    </header>
    <nav>
      <ul>
        <li><a href="#">메뉴 - 1</a></li>
        <li><a href="#">메뉴 - 2</a></li>
        <li><a href="#">메뉴 - 3</a></li>
      </ul>
    </nav>
    <section>
      <article>
        <h1>Lorem ipsum dolor sit amet</h1>
        <p>Lorem ipsum dolor sit amet</p>
      </article>
      <article>
        <h1>Lorem ipsum dolor sit amet</h1>
        <p>Lorem ipsum dolor sit amet</p>
      </article>
    </section>
    <footer>
      <span>서울특별시 강서구 내발산동</span>
    </footer>
  </body>
</html>
