<!-- HTML5 문서형식 선언 : HTML5 형식이라는 것을 알려주기 위한 태그 -->
<!DOCTYPE html>
<!-- lang : 검색 엔진이 웹 페이지를 탐색할 때 해당 웹 페이지를
            어떤 언어로 작성했는지 쉽게 알 수 있도록 도움 -->
<html lang="en">
<head>
    <!-- meta : 웹 페이지 추가 정보 전달 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- title : 페이지 제목 지정 -->
    <title>TITLE</title>
    <!-- head 태그 안의 title 태그 : 웹 브라우저 탭에 표시 -->
</head>
<body>
    <h1>Hello HTML5</h1>
</body>
</html>
