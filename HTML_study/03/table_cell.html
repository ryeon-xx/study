<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- <table> 태그 : 표 삽입 -->
    <!-- border 속성 : 표의 테두리 굵기 지정 -->
    <table border="1">
        <!-- <tr> 태그 : 표에 행 삽입(table row) -->
        <tr>
            <!-- <th> 태그 : 표의 제목 셀 생성(table heading) -->
            <th></th>
            <th>월</th>
            <th>화</th>
            <th>수</th>
            <th>목</th>
            <th>금</th>
        </tr>
        <tr>
            <!-- <td> 태그 : 표의 일반 셀 생성(table data) -->
            <td>1교시</td>
            <td>영어</td>
            <td>국어</td>
            <td>과학</td>
            <td>미술</td>
            <td>기술</td>
        </tr>
        <tr>
            <td>2교시</td>
            <td>도덕</td>
            <td>체육</td>
            <td>영어</td>
            <td>수학</td>
            <td>사회</td>
        </tr>
    </table>
</body>
</html>
