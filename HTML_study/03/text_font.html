<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 TEXT Basic Page</title>
</head>
<body>
    <!-- 글자 모양 태그 -->

    <!-- <b> 태그 : 굵은 글자(bold) -->
    <h1><b>굵은 글자</b></h1>
    <!-- <i> 태그 : 기울어진 글자 (italic) -->
    <h1><i>기울어진 글자</i></h1>
    <!-- <small> 태그 : 작은 글자 -->
    <h1><small>작은 글자</small></h1>
    <!-- <sub> 태그 : 아래 첨자(subscript) -->
    <h1>평소 글자의 <sub>아래 첨자</sub></h1>
    <!-- <sup> 태그 : 위 첨자(superscript) -->
    <h1>평소 글자의 <sup>위 첨자</sup></h1>
    <!-- <ins> 태그 : 밑줄 글자(insert) -->
    <h1><ins>밑줄 글자</ins></h1>
    <!-- <del> 태그 : 취소선이 그어진 글자(delete) -->
    <h1><del>취소선이 그어진 글자</del></h1>

    <hr>

    <b>굵은 글자</b> <br>
    <i>기울어진 글자</i> <br>
    <small>작은 글자</small> <br>
    <sub>아래 첨자</sub> <br>
    <sup>위 첨자</sup> <br>
    <ins>밑줄 글자</ins> <br>
    <del>취소선이 그어진 글자</del>
</body>
</html>
