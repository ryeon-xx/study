<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="card card-default card-borderless">
        <div class="card-body">
            <div class="row mb-3">
                <div class="col">
                    <div class="input-group">
                        <input 
                            type="text"
                            class="form-control"
                            name="msg"
                            placeholder="할 일을 여기에 입력!"
                            v-model.trim="todo"
                            @keyup.enter="addTodo"
                        />
                        <span class="btn btn-primary input-group-addon" 
                              @click="addTodo">추가</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col">
            <ul class="list-group">
                <li
                v-for="todoitem in todolist"
                :key="todoitem.id"
                class="list-group-item"
                :class="{ 'list-group-item-success' : todoitem.completed }"
                @click="toggleCompleted(todoitem.id)"
                >
                <span class="pointer" :class="{ 'todo-done' : todoitem.completed }">
                    {{todoitem.todo}} {{todoitem.completed ? "(완료)" : ""}}
                </span>
                <span class="float-end badge bg-secondary pointer"
                        @click="deleteTodo(todoitem.id)">삭제</span>
                </li>
            </ul>
        </div>
    </div>
</body>
</html>
