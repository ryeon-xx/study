<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .btnColor {
            background-color: lightblue;
            color: white;
        }
        .btnAlign {
            width: 120px;
            text-align: center;
        }
        .btnBorder {
            border: 1.5px solid gray;
        }
    </style>
</head>
<body>
    <div id="app">
        <input type="checkbox" v-model="btnColor">
        색상
        <br>
        <input type="checkbox" v-model="btnAlign">
        정렬, 크기
        <br>
        <input type="checkbox" v-model="btnBorder">
        테두리
        <br>
        <button :class="{btnColor, btnAlign, btnBorder}">테두리</button>
    </div>

    <script src="https://unpkg.com/vue"></script>

    <script>
        let vm = Vue.createApp({
            name : "App",
            data() {
                return {
                    btnColor: false,
                    btnAlign: false,
                    btnBorder: false,
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
